name: Deploy Tencent

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-tencent
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.TENCENT_PEM_KEY }}' > ~/.ssh/tencent.pem
          chmod 600 ~/.ssh/tencent.pem
          ssh-keyscan -H 101.43.60.21 >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 '
            set -eu
            sudo mkdir -p /opt/agentharness
            sudo chown -R ubuntu:ubuntu /opt/agentharness
            rm -rf /tmp/agentharness-release
            mkdir -p /tmp
          '

      - name: Checkout release on server
        run: |
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 "
            set -eu
            rm -rf /tmp/agentharness-release
            git clone --depth 1 https://github.com/${GITHUB_REPOSITORY}.git /tmp/agentharness-release
            cd /tmp/agentharness-release
            git fetch --depth 1 origin ${GITHUB_SHA}
            git checkout --force ${GITHUB_SHA}
          "

      - name: Deploy native services
        run: |
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 "RELEASE_DIR=/tmp/agentharness-release APP_DIR=/opt/agentharness APP_PORT=9997 BACKEND_PORT=8080 APP_VERSION=0.1.90 GIT_COMMIT=${GITHUB_SHA} bash /tmp/agentharness-release/scripts/deploy_remote_native.sh"