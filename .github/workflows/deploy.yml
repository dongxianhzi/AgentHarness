name: Deploy Tencent

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-tencent
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.TENCENT_PEM_KEY }}' > ~/.ssh/tencent.pem
          chmod 600 ~/.ssh/tencent.pem
          ssh-keyscan -H 101.43.60.21 >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 '
            set -eu
            sudo mkdir -p /opt/agentharness
            sudo chown -R ubuntu:ubuntu /opt/agentharness
            rm -rf /tmp/agentharness-release
            rm -f /tmp/agentharness-release.tar.gz
            mkdir -p /tmp
          '

      - name: Upload release bundle
        run: |
          git archive --format=tar.gz --output=/tmp/agentharness-release.tar.gz ${GITHUB_SHA}
          scp -i ~/.ssh/tencent.pem /tmp/agentharness-release.tar.gz ubuntu@101.43.60.21:/tmp/agentharness-release.tar.gz
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 "
            set -eu
            rm -rf /tmp/agentharness-release
            mkdir -p /tmp/agentharness-release
            tar -xzf /tmp/agentharness-release.tar.gz -C /tmp/agentharness-release
            rm -f /tmp/agentharness-release.tar.gz
          "

      - name: Sync runtime secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          lines = []
          for key in ("RESEND_API_KEY", "RESEND_FROM_EMAIL"):
              value = os.environ.get(key, "")
              if value:
                  lines.append(f"{key}={value}")

          Path("/tmp/agentharness-runtime.env").write_text(
              "\n".join(lines) + ("\n" if lines else "")
          )
          PY

          scp -i ~/.ssh/tencent.pem /tmp/agentharness-runtime.env ubuntu@101.43.60.21:/tmp/agentharness-runtime.env
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 '
            set -eu
            APP_DIR=/opt/agentharness
            RELEASE_DIR=/tmp/agentharness-release
            ENV_FILE="$APP_DIR/.env.production"

            if [ ! -f "$ENV_FILE" ]; then
              if [ -f "$RELEASE_DIR/.env.production.example" ]; then
                cp "$RELEASE_DIR/.env.production.example" "$ENV_FILE"
              else
                : > "$ENV_FILE"
              fi
            fi

            python3 - "$ENV_FILE" /tmp/agentharness-runtime.env <<"PY"
from pathlib import Path
import sys

env_path = Path(sys.argv[1])
updates_path = Path(sys.argv[2])

env_lines = env_path.read_text().splitlines() if env_path.exists() else []
updates = {}

if updates_path.exists():
    for line in updates_path.read_text().splitlines():
        if not line or line.startswith("#") or "=" not in line:
            continue
        key, value = line.split("=", 1)
        if value:
            updates[key] = value

for key, value in updates.items():
    for index, line in enumerate(env_lines):
        if line.startswith(f"{key}="):
            env_lines[index] = f"{key}={value}"
            break
    else:
        env_lines.append(f"{key}={value}")

env_path.write_text("\n".join(env_lines) + ("\n" if env_lines else ""))
PY

            rm -f /tmp/agentharness-runtime.env
          '

      - name: Deploy native services
        run: |
          ssh -i ~/.ssh/tencent.pem ubuntu@101.43.60.21 "RELEASE_DIR=/tmp/agentharness-release APP_DIR=/opt/agentharness APP_PORT=9997 BACKEND_PORT=8080 APP_VERSION=0.2.1 GIT_COMMIT=${GITHUB_SHA} bash /tmp/agentharness-release/scripts/deploy_remote_native.sh"